<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Dance-Offs: Vote</title>

  <link rel="stylesheet" href="/shared/style2.css?v=7000">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ----------------------------------------------------
       OVERLAY WITH ANIMATED LOADING INDICATOR
    ---------------------------------------------------- */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #ffcc00;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Bangers', cursive;
      font-size: 48px;
      letter-spacing: 2px;
      text-align: center;
      z-index: 999999;
      opacity: 1;
      transition: opacity 0.4s ease;
      cursor: pointer;
    }

    #loadingOverlay small {
      font-size: 22px;
      margin-top: 12px;
      color: #fff;
      opacity: 0.85;
    }

    #loadingOverlay .pulse {
      animation: pulse 1.4s infinite ease-in-out;
    }

    @keyframes pulse {
      0%   { opacity: 0.4; }
      50%  { opacity: 1; }
      100% { opacity: 0.4; }
    }

    #loadingBar {
      width: 180px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 20px;
    }

    #loadingBar::after {
      content: "";
      display: block;
      width: 60px;
      height: 100%;
      background: linear-gradient(90deg, transparent, #ffcc00, transparent);
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-60px); }
      100% { transform: translateX(180px); }
    }

    .video-slot {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-slot iframe.battle-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .vote-option input[type="radio"] {
      display: none;
    }

    .vote-box {
      width: 100%;
      max-width: 240px;
      padding: 18px;
      background: #111;
      border: 3px solid #333;
      border-radius: 12px;
      text-align: center;
      cursor: not-allowed;
      opacity: 0.5;
      transition: 0.25s ease;
      margin: 15px auto 0;
    }

    .vote-option.enabled .vote-box {
      cursor: pointer;
      opacity: 1;
    }

    .vote-option.enabled:hover .vote-box {
      border-color: #ffcc00;
      background: #1a1a1a;
      transform: translateY(-3px);
    }

    .vote-option input[type="radio"]:checked + .vote-box {
      border-color: #ffcc00;
      background: #222;
      box-shadow: 0 0 12px rgba(255,204,0,0.6);
      transform: translateY(-4px);
    }
  </style>
</head>

<body class="vote-page-only">

<!-- SINGLE OVERLAY -->
<div id="loadingOverlay">
  <div class="pulse">Tap to Play</div>
  <small>Tap Here…</small>
  <div id="loadingBar"></div>
</div>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="dancers.html">Dancers</a>
  <a href="https://upload.dance-offs.com/uploads/djs.html">DJs</a>
  <a href="vote.html" class="active">Vote</a>
  <a href="prizes.html">Prizes</a>
  <a href="shop.html">Shop</a>
</nav>

<p id="countdownTimer" style="text-align:center; margin-top:15px; font-size:20px;"></p>

<main class="page-container">

  <div class="vote-layout">

    <!-- LEFT = CHAMPION -->
    <div class="vote-column">
      <div id="championVideo"></div>

      <label class="vote-option">
        <input type="radio" name="voteChoice" value="champion" id="voteChampionOption" disabled onclick="submitVote()">
        <div class="vote-box"><span class="vote-title">Vote Champion</span></div>
      </label>
    </div>

    <!-- MIDDLE -->
    <div class="vote-column">
      <h2 style="font-family:'Bangers', cursive; font-size:32px;">Vote for £1.50</h2>
      <p style="color:#ccc; margin-bottom:10px;">Pay £1.50 to unlock your vote.</p>

      <div style="width:260px; margin:auto; transform:scale(0.85); transform-origin:top center;">
        <div id="paypal-button-container"></div>
      </div>
    </div>

    <!-- RIGHT = CHALLENGER -->
    <div class="vote-column">
      <div id="challengerVideo"></div>

      <label class="vote-option">
        <input type="radio" name="voteChoice" value="challenger" id="voteChallengerOption" disabled onclick="submitVote()">
        <div class="vote-box"><span class="vote-title">Vote Challenger</span></div>
      </label>
    </div>

  </div>

  <section id="voteProgressSection" style="margin-top:30px; text-align:center;">
    <h3 style="font-family:'Bangers', cursive; font-size:26px; margin-bottom:15px;">Vote Progress</h3>

    <div style="margin-bottom:20px;">
      <div id="championCount" class="vote-count" style="font-size:16px;">Champion Votes: 0</div>
      <div class="progress-wrapper" style="margin-top:6px;">
        <div id="championBar" class="progress-bar champion-bar"></div>
      </div>
    </div>

    <div>
      <div id="challengerCount" class="vote-count" style="font-size:16px;">Challenger Votes: 0</div>
      <div class="progress-wrapper" style="margin-top:6px;">
        <div id="challengerBar" class="progress-bar challenger-bar"></div>
      </div>
    </div>

    <div style="margin-top:10px; font-size:14px; color:#ccc;">
      <span id="remainingVotesText">Remaining votes: 200</span>
    </div>
  </section>

  <div style="margin-top:40px; text-align:center;">
    <h3 style="font-family:'Bangers', cursive; font-size:28px; margin-bottom:10px;">Now Playing</h3>
    <p id="djTrackName" style="color:#ccc; margin-bottom:10px;"></p>

    <audio id="djPlayer" controls playsinline style="width:100%; max-width:500px;"></audio>
  </div>

</main>

<footer class="footer">
  © 2026 Dance-Offs. All rights reserved.
  <br>
  <a href="https://dance-offs.com/tnc.html" style="color:#ffcc00; text-decoration:underline;">Terms & Conditions</a>
</footer>

<script>
const endpoint = "https://script.google.com/macros/s/AKfycbw5sreBX1RgTXegFE8Gkr4Y3thXcyNOo0YljPRVLry_fe2jBO80TAr1EShOzdfplDgi/exec";

let currentBattleID = null;
let currentTransactionID = null;
let currentVoterEmail = null;

let champion = null;
let challenger = null;

let championIframe = null;
let challengerIframe = null;

/* ----------------------------------------------------
   OVERLAY — NON-BLOCKING
---------------------------------------------------- */
document.getElementById("loadingOverlay").addEventListener("click", () => {
  const overlay = document.getElementById("loadingOverlay");
  overlay.style.opacity = "0";
  setTimeout(() => overlay.style.display = "none", 400);

  const player = document.getElementById("djPlayer");
  player.play().catch(() => {});

  playVideo(championIframe);
  playVideo(challengerIframe);
});

/* ----------------------------------------------------
   NO-CACHE FETCH
---------------------------------------------------- */
function nocache(url) {
  const sep = url.includes("?") ? "&" : "?";
  return fetch(url + sep + "t=" + Date.now());
}

/* ----------------------------------------------------
   YOUTUBE HELPERS
---------------------------------------------------- */
function extractID(url) {
  if (!url) return null;
  const clean = url.split("?")[0];
  const patterns = [
    /shorts\/([^?&/]+)/,
    /youtu\.be\/([^?&/]+)/,
    /v=([^?&/]+)/,
    /embed\/([^?&/]+)/,
    /youtube\.com\/watch\/([^?&/]+)/
  ];
  for (const p of patterns) {
    const m = clean.match(p);
    if (m && m[1]) return m[1];
  }
  return null;
}

function embed(id) {
  const wrapper = document.createElement("div");
  wrapper.className = "video-slot";

  const iframe = document.createElement("iframe");
  iframe.className = "battle-frame";

  iframe.src =
    `https://www.youtube.com/embed/${id}?autoplay=0&mute=1&loop=1&playlist=${id}` +
    `&modestbranding=1&rel=0&playsinline=1&enablejsapi=1&controls=0&start=0&origin=${location.origin}`;
  iframe.allow = "autoplay; encrypted-media";

  iframe.onload = () => {
    iframe.contentWindow.postMessage(
      JSON.stringify({ event: "command", func: "pauseVideo" }),
      "*"
    );
  };

  wrapper.appendChild(iframe);
  return { wrapper, iframe };
}

function playVideo(iframe) {
  if (!iframe) return;
  iframe.contentWindow.postMessage(
    JSON.stringify({ event: "command", func: "playVideo" }),
    "*"
  );
}

/* ----------------------------------------------------
   SMOOTH LOAD SEQUENCE
---------------------------------------------------- */
window.onload = async () => {
  await loadBattle();
  await loadVoteCounts();

  setTimeout(loadPayPalButtons, 800);
  setTimeout(loadDJTrack, 1200);

  loadCountdown();
};

/* ----------------------------------------------------
   LOAD PAYPAL (FIXED)
---------------------------------------------------- */
function loadPayPalButtons() {
  const script = document.createElement("script");
  script.src =
    "https://www.paypal.com/sdk/js?client-id=AX4Xv6G1hrF13n76DY6HPyTIOK13Gkz7Af3OqQMarnqPXRmhqtOb733jfZnetspN-HH7CZh_MFSRsIN8&currency=GBP&components=buttons";

  script.onload = () => {
    paypal.Buttons({
      createOrder: (data, actions) =>
        actions.order.create({
          purchase_units: [{ amount: { value: "1.50" } }]
        }),

      onApprove: async (data, actions) => {
        const details = await actions.order.capture();

        currentVoterEmail = details.payer.email_address;
        currentTransactionID = data.orderID;

        document.querySelectorAll(".vote-option").forEach(opt => {
          opt.classList.add("enabled");
          opt.querySelector("input").disabled = false;
        });
      }
    }).render("#paypal-button-container");
  };

  document.body.appendChild(script);
}

/* ----------------------------------------------------
   ROBUST VOTE SUBMISSION
---------------------------------------------------- */
async function submitVote() {
  if (!currentTransactionID) {
    alert("Payment required before voting.");
    return;
  }

  const choice = document.querySelector('input[name="voteChoice"]:checked');
  if (!choice) return;

  const side = choice.value;
  const dancerName =
    side === "champion" ? champion.dancer : challenger.dancer;
  const dancerURL =
    side === "champion" ? champion.url : challenger.url;

  const payload = {
    mode: "vote",
    battle: currentBattleID,
    side,
    tx: currentTransactionID,
    email: currentVoterEmail || "",
    WinnerName: dancerName,
    WinnerURL: dancerURL
  };

  let success = false;
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      if (text.includes("Vote logged")) {
        success = true;
        break;
      }
    } catch (err) {
      console.warn("Vote attempt failed:", err);
    }

    await new Promise(r => setTimeout(r, 500 * attempt));
  }

  if (!success) {
    alert("Your payment succeeded but your vote could not be recorded. Please contact support.");
    return;
  }

  window.location.href = "thankyou.html";
}
/* ----------------------------------------------------
   LOAD BATTLE
---------------------------------------------------- */
async function loadBattle() {
  const [state, dancers] = await Promise.all([
    nocache(endpoint + "?mode=getstate").then(r => r.json()),
    nocache(endpoint + "?mode=getdancers").then(r => r.json())
  ]);

  currentBattleID = state.battleID;

  champion   = dancers[state.championIndex];
  challenger = dancers[state.challengerIndex];

  const champContainer = document.getElementById("championVideo");
  const challContainer = document.getElementById("challengerVideo");

  champContainer.innerHTML = "";
  challContainer.innerHTML = "";

  const champEmbed = embed(extractID(champion.url));
  const challEmbed = embed(extractID(challenger.url));

  champContainer.appendChild(champEmbed.wrapper);
  challContainer.appendChild(challEmbed.wrapper);

  championIframe = champEmbed.iframe;
  challengerIframe = challEmbed.iframe;
}

/* ----------------------------------------------------
   LOAD DJ TRACK (DELAYED)
---------------------------------------------------- */
async function loadDJTrack() {
  try {
    const data = await nocache(endpoint + "?mode=getdjs").then(r => r.json());
    if (!data || data.length === 0) return;

    const last = data[data.length - 1];
    const player = document.getElementById("djPlayer");

    document.getElementById("djTrackName").innerText =
      last.dj_name + " – " + last.deck1_title;

    player.src = last.mp3url;
    player.volume = 1;

  } catch (err) {
    console.error("DJ load failed:", err);
  }
}

/* ----------------------------------------------------
   LOAD VOTE COUNTS
---------------------------------------------------- */
async function loadVoteCounts() {
  if (!currentBattleID) return;

  const data = await nocache(
    endpoint + "?mode=getvotestate&battleID=" + currentBattleID
  ).then(r => r.json());

  const championVotes   = data.champion.used   || 0;
  const challengerVotes = data.challenger.used || 0;

  const maxVotes        = data.maxVotes || 200;
  const perBattleRem    = data.perBattleRemaining;
  const globalRem       = data.globalRemaining;

  const remaining = Math.min(perBattleRem, globalRem);

  document.getElementById("championCount").innerText =
    "Champion Votes: " + championVotes;

  document.getElementById("challengerCount").innerText =
    "Challenger Votes: " + challengerVotes;

  document.getElementById("remainingVotesText").innerText =
    "Remaining votes: " + remaining;

  document.getElementById("championBar").style.width =
    (championVotes / maxVotes * 100) + "%";

  document.getElementById("challengerBar").style.width =
    (challengerVotes / maxVotes * 100) + "%";
}

/* ----------------------------------------------------
   COUNTDOWN
---------------------------------------------------- */
function loadCountdown() {
  nocache(endpoint + "?mode=getstate")
    .then(r => r.json())
    .then(state => {
      const lastUpdated = new Date(state.lastUpdated);
      const nextReset = new Date(lastUpdated.getTime() + 7 * 24 * 60 * 60 * 1000);

      function updateTimer() {
        const now = new Date();
        const diff = nextReset - now;

        if (diff <= 0) {
          document.getElementById("countdownTimer").innerText =
            "New battle dropping soon…";
          return;
        }

        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff / 3600000) % 24);
        const mins = Math.floor((diff / 60000) % 60);
        const secs = Math.floor((diff / 1000) % 60);

        document.getElementById("countdownTimer").innerText =
          `Next battle in ${days}d ${hours}h ${mins}m ${secs}s`;
      }

      updateTimer();
      setInterval(updateTimer, 1000);
    });
}
</script>

</body>
</html>
