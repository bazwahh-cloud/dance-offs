<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Dance-Offs: Vote</title>

  <link rel="stylesheet" href="/shared/style2.css?v=7000">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://www.paypal.com/sdk/js?client-id=AX4Xv6G1hrF13n76DY6HPyTIOK13Gkz7Af3OqQMarnqPXRmhqtOb733jfZnetspN-HH7CZh_MFSRsIN8&currency=GBP&components=buttons"></script>

  <style>
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      color: #ffcc00;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Bangers', cursive;
      font-size: 48px;
      letter-spacing: 2px;
      text-align: center;
      z-index: 999999;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .video-slot {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-slot iframe.battle-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.25s ease;
    }

    .play-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .play-overlay .icon {
      font-size: 64px;
      color: #ffcc00;
      text-shadow: 0 0 10px #000;
    }

    .vote-option input[type="radio"] {
      display: none;
    }

    .vote-box {
      width: 100%;
      max-width: 240px;
      padding: 18px;
      background: #111;
      border: 3px solid #333;
      border-radius: 12px;
      text-align: center;
      cursor: not-allowed;
      opacity: 0.5;
      transition: 0.25s ease;
      margin: 15px auto 0;
    }

    .vote-option.enabled .vote-box {
      cursor: pointer;
      opacity: 1;
    }

    .vote-option.enabled:hover .vote-box {
      border-color: #ffcc00;
      background: #1a1a1a;
      transform: translateY(-3px);
    }

    .vote-option input[type="radio"]:checked + .vote-box {
      border-color: #ffcc00;
      background: #222;
      box-shadow: 0 0 12px rgba(255,204,0,0.6);
      transform: translateY(-4px);
    }
  </style>
</head>

<body class="vote-page-only">

<div id="loadingOverlay">Loading battle…</div>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="dancers.html">Dancers</a>
  <a href="https://upload.dance-offs.com/uploads/djs.html">DJs</a>
  <a href="vote.html" class="active">Vote</a>
  <a href="prizes.html">Prizes</a>
  <a href="shop.html">Shop</a>
</nav>

<p id="countdownTimer" style="text-align:center; margin-top:15px; font-size:20px;"></p>

<main class="page-container">

  <div class="vote-layout">

    <!-- LEFT = CHAMPION -->
    <div class="vote-column">
      <div id="championVideo"></div>

      <label class="vote-option">
        <input type="radio" name="voteChoice" value="champion" id="voteChampionOption" disabled onclick="submitVote()">
        <div class="vote-box"><span class="vote-title">Vote Champion</span></div>
      </label>
    </div>

    <!-- MIDDLE -->
    <div class="vote-column">
      <h2 style="font-family:'Bangers', cursive; font-size:32px;">Vote for £1.50</h2>
      <p style="color:#ccc; margin-bottom:10px;">Pay £1.50 to unlock your vote.</p>

      <div style="width:260px; margin:auto; transform:scale(0.85); transform-origin:top center;">
        <div id="paypal-button-container"></div>
      </div>
    </div>

    <!-- RIGHT = CHALLENGER -->
    <div class="vote-column">
      <div id="challengerVideo"></div>

      <label class="vote-option">
        <input type="radio" name="voteChoice" value="challenger" id="voteChallengerOption" disabled onclick="submitVote()">
        <div class="vote-box"><span class="vote-title">Vote Challenger</span></div>
      </label>
    </div>

  </div>

  <section id="voteProgressSection" style="margin-top:30px; text-align:center;">
    <h3 style="font-family:'Bangers', cursive; font-size:26px; margin-bottom:15px;">Vote Progress</h3>

    <div style="margin-bottom:20px;">
      <div id="championCount" class="vote-count" style="font-size:16px;">Champion Votes: 0</div>
      <div class="progress-wrapper" style="margin-top:6px;">
        <div id="championBar" class="progress-bar champion-bar"></div>
      </div>
    </div>

    <div>
      <div id="challengerCount" class="vote-count" style="font-size:16px;">Challenger Votes: 0</div>
      <div class="progress-wrapper" style="margin-top:6px;">
        <div id="challengerBar" class="progress-bar challenger-bar"></div>
      </div>
    </div>

    <div style="margin-top:10px; font-size:14px; color:#ccc;">
      <span id="remainingVotesText">Remaining votes: 200</span>
    </div>
  </section>

  <div style="margin-top:40px; text-align:center;">
    <h3 style="font-family:'Bangers', cursive; font-size:28px; margin-bottom:10px;">Now Playing</h3>
    <p id="djTrackName" style="color:#ccc; margin-bottom:10px;"></p>

    <audio id="djPlayer" controls playsinline style="width:100%; max-width:500px;"></audio>
  </div>

</main>

<footer class="footer">
  © 2026 Dance-Offs. All rights reserved.
  <br>
  <a href="https://dance-offs.com/tnc.html" style="color:#ffcc00; text-decoration:underline;">Terms & Conditions</a>
</footer>
<script>
const endpoint = "https://script.google.com/macros/s/AKfycbw5sreBX1RgTXegFE8Gkr4Y3thXcyNOo0YljPRVLry_fe2jBO80TAr1EShOzdfplDgi/exec";

let currentBattleID = null;
let currentTransactionID = null;
let currentVoterEmail = null;

let champion = null;
let challenger = null;

let djTrackLoaded = false;
let djTrackStarted = false;

/* ----------------------------------------------------
   GLOBAL USER-GESTURE LISTENER (REQUIRED FOR AUDIO)
---------------------------------------------------- */
let userHasInteracted = false;

document.addEventListener("click", () => {
  userHasInteracted = true;

  if (djTrackLoaded && !djTrackStarted) {
    const player = document.getElementById("djPlayer");
    djTrackStarted = true;
    player.play().catch(() => {});
  }
}, { once: true });

function nocache(url) {
  const sep = url.includes("?") ? "&" : "?";
  return fetch(url + sep + "t=" + Date.now());
}

/* ----------------------------------------------------
   PAYPAL
---------------------------------------------------- */
paypal.Buttons({
  createOrder: (data, actions) =>
    actions.order.create({
      purchase_units: [{ amount: { value: "1.50" } }]
    }),

  onApprove: (data, actions) =>
    actions.order.capture().then(details => {
      currentVoterEmail = details.payer.email_address;
      currentTransactionID = data.orderID;

      document.querySelectorAll(".vote-option").forEach(opt => {
        opt.classList.add("enabled");
        opt.querySelector("input").disabled = false;
      });
    })
}).render("#paypal-button-container");

/* ----------------------------------------------------
   VIDEO HELPERS
---------------------------------------------------- */
function extractID(url) {
  if (!url) return null;
  const clean = url.split("?")[0];
  const patterns = [
    /shorts\/([^?&/]+)/,
    /youtu\.be\/([^?&/]+)/,
    /v=([^?&/]+)/,
    /embed\/([^?&/]+)/,
    /youtube\.com\/watch\/([^?&/]+)/
  ];
  for (const p of patterns) {
    const m = clean.match(p);
    if (m && m[1]) return m[1];
  }
  return null;
}

function embed(id) {
  const wrapper = document.createElement("div");
  wrapper.className = "video-slot";

  const overlay = document.createElement("div");
  overlay.className = "play-overlay";
  overlay.onclick = () => startVideo(overlay);

  const icon = document.createElement("i");
  icon.className = "fa-solid fa-play icon";
  overlay.appendChild(icon);

  const iframe = document.createElement("iframe");
  iframe.className = "battle-frame";
  iframe.src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&modestbranding=1&rel=0&playsinline=1&enablejsapi=1`;
  iframe.allow = "autoplay; encrypted-media";

  wrapper.appendChild(iframe);
  wrapper.appendChild(overlay);

  return wrapper;
}

function startVideo(overlay) {
  overlay.classList.add("hidden");
  const iframe = overlay.parentElement.querySelector("iframe");
  iframe.contentWindow.postMessage(
    JSON.stringify({ event: "command", func: "playVideo" }),
    "*"
  );

  if (djTrackLoaded && !djTrackStarted) {
    const player = document.getElementById("djPlayer");
    djTrackStarted = true;
    player.play().catch(() => {});
  }
}

/* ----------------------------------------------------
   SMOOTH LOAD
---------------------------------------------------- */
window.onload = async () => {
  const battlePromise = loadBattle();
  const votesPromise  = loadVoteCounts();
  const djPromise     = loadDJTrack();

  const timeout = new Promise(resolve => setTimeout(resolve, 3000));

  await Promise.race([battlePromise, timeout]);

  const overlay = document.getElementById("loadingOverlay");
  overlay.style.opacity = "0";
  setTimeout(() => overlay.style.display = "none", 400);

  loadCountdown();
};

/* ----------------------------------------------------
   LOAD BATTLE
---------------------------------------------------- */
async function loadBattle() {
  const [state, dancers] = await Promise.all([
    nocache(endpoint + "?mode=getstate").then(r => r.json()),
    nocache(endpoint + "?mode=getdancers").then(r => r.json())
  ]);

  currentBattleID = state.battleID;

  champion   = dancers[state.championIndex];
  challenger = dancers[state.challengerIndex];

  document.getElementById("championVideo").innerHTML = "";
  document.getElementById("challengerVideo").innerHTML = "";

  document.getElementById("championVideo").appendChild(
    embed(extractID(champion.url))
  );
  document.getElementById("challengerVideo").appendChild(
    embed(extractID(challenger.url))
  );
}

/* ----------------------------------------------------
   LOAD DJ TRACK (NO AUTOPLAY)
---------------------------------------------------- */
async function loadDJTrack() {
  try {
    const data = await nocache(endpoint + "?mode=getdjs").then(r => r.json());
    if (!data || data.length === 0) return;

    const last = data[data.length - 1];
    const player = document.getElementById("djPlayer");

    document.getElementById("djTrackName").innerText =
      last.dj_name + " – " + last.deck1_title;

    player.src = last.mp3url;
    player.volume = 1;

    djTrackLoaded = true;

    if (userHasInteracted && !djTrackStarted) {
      djTrackStarted = true;
      player.play().catch(() => {});
    }

  } catch (err) {
    console.error("DJ load failed:", err);
  }
}

/* ----------------------------------------------------
   LOAD VOTE COUNTS
---------------------------------------------------- */
async function loadVoteCounts() {
  if (!currentBattleID) return;

  const data = await nocache(
    endpoint + "?mode=getvotestate&battleID=" + currentBattleID
  ).then(r => r.json());

  const championVotes   = data.champion.used   || 0;
  const challengerVotes = data.challenger.used || 0;
  const maxVotes = data.maxVotes || 200;
  const remaining = data.remaining || (maxVotes - (championVotes + challengerVotes));

  document.getElementById("championCount").innerText =
    "Champion Votes: " + championVotes;

  document.getElementById("challengerCount").innerText =
    "Challenger Votes: " + challengerVotes;

  document.getElementById("remainingVotesText").innerText =
    "Remaining votes: " + remaining;

  document.getElementById("championBar").style.width =
    (championVotes / maxVotes * 100) + "%";

  document.getElementById("challengerBar").style.width =
    (challengerVotes / maxVotes * 100) + "%";
}

/* ----------------------------------------------------
   SUBMIT VOTE
---------------------------------------------------- */
function submitVote() {
  if (!currentTransactionID) {
    alert("Payment required before voting.");
    return;
  }

  const choice = document.querySelector('input[name="voteChoice"]:checked');
  if (!choice) return;

  const side = choice.value;
  const dancerName = side === "champion" ? champion.dancer : challenger.dancer;
  const dancerURL  = side === "champion" ? champion.url    : challenger.url;

  const form = document.createElement("form");
  form.method = "POST";
  form.action = endpoint;

  function add(name, value) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = name;
    input.value = value;
    form.appendChild(input);
  }

  add("mode", "vote");
  add("battle", currentBattleID);
  add("side", side);
  add("tx", currentTransactionID);
  add("email", currentVoterEmail || "");
  add("WinnerName", dancerName);
  add("WinnerURL", dancerURL);

  document.body.appendChild(form);
  form.submit();

  setTimeout(() => {
    window.location.href = "thankyou.html";
  }, 400);
}

/* ----------------------------------------------------
   COUNTDOWN
---------------------------------------------------- */
function loadCountdown() {
  nocache(endpoint + "?mode=getstate")
    .then(r => r.json())
    .then(state => {
      const lastUpdated = new Date(state.lastUpdated);
      const nextReset = new Date(lastUpdated.getTime() + 7 * 24 * 60 * 60 * 1000);

      function updateTimer() {
        const now = new Date();
        const diff = nextReset - now;

        if (diff <= 0) {
          document.getElementById("countdownTimer").innerText =
            "New battle dropping soon…";
          return;
        }

        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff / 3600000) % 24);
        const mins = Math.floor((diff / 60000) % 60);
        const secs = Math.floor((diff / 1000) % 60);

        document.getElementById("countdownTimer").innerText =
          `Next battle in ${days}d ${hours}h ${mins}m ${secs}s`;
      }

      updateTimer();
      setInterval(updateTimer, 1000);
    });
}
</script>
</html>
