name: Deploy WordPress Shop (wp-content → /shop)

on:
  push:
    branches:
      - main
    paths:
      - "wp-content/**"
      - ".github/workflows/deploy-shop.yml"

jobs:
  ftp-deploy:
    name: FTP Deploy (Shop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy wp-content to /shop
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SHOP_FTP_HOST }}
          username: ${{ secrets.SHOP_FTP_USERNAME }}
          password: ${{ secrets.SHOP_FTP_PASSWORD }}

          protocol: ftps
          port: 21

          # Deploy ONLY your wp-content folder
          local-dir: ./wp-content/
          server-dir: /HTDOCS/shop/wp-content/

          # Protect server-managed WordPress folders
          exclude: |
            wp-content/uploads/**
            wp-content/cache/**
            wp-content/upgrade/**
            wp-content/wflogs/**
            wp-config.php
            .git/**
            .github/**
            .gitignore
            README.md
            **/*.yml
            **/*.yaml
            **/*.md

          log-level: verbose
